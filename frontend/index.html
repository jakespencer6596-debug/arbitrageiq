<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArbitrageIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            keyframes: {
              'pulse-green': {
                '0%, 100%': { boxShadow: '0 0 0 0 rgba(34,197,94,0.4)' },
                '50%': { boxShadow: '0 0 0 8px rgba(34,197,94,0)' },
              },
              'slide-in-right': {
                '0%': { transform: 'translateX(100%)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' },
              },
              'fade-in': {
                '0%': { opacity: '0', transform: 'translateY(8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'row-highlight': {
                '0%': { backgroundColor: 'rgba(34,197,94,0.15)' },
                '100%': { backgroundColor: 'transparent' },
              },
            },
            animation: {
              'pulse-green': 'pulse-green 2s ease-in-out infinite',
              'slide-in-right': 'slide-in-right 0.3s ease-out',
              'fade-in': 'fade-in 0.3s ease-out',
              'row-highlight': 'row-highlight 3s ease-out',
            },
          },
        },
      }
    </script>
    <style>
      * { scrollbar-width: thin; scrollbar-color: #374151 #111827; }
      *::-webkit-scrollbar { width: 6px; height: 6px; }
      *::-webkit-scrollbar-track { background: #111827; }
      *::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
      *::-webkit-scrollbar-thumb:hover { background: #4b5563; }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer {
        background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.03) 50%, transparent 75%);
        background-size: 200% 100%;
        animation: shimmer 3s infinite;
      }
      /* Recharts tooltip overrides */
      .recharts-tooltip-wrapper { outline: none; }
      .recharts-default-tooltip { background: #111827 !important; border: 1px solid #374151 !important; border-radius: 8px !important; }
    </style>
  </head>
  <body class="bg-gray-950 text-gray-100 min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
